<svg width="900" height="720" viewBox="0 0 900 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="450" y1="0" x2="450" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E8"/>
      <stop offset="1" stop-color="#E3D7C8"/>
    </linearGradient>
