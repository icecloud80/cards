  <rect width="900" height="720" fill="url(#bg)"/>
  <text x="48" y="68" fill="#17303D" font-family="'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700">Mobile 托管三态预览</text>
