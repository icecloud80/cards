<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Declare Compact Preview</title>
    <style>
      /**
       * 作用：
       * 提供手游紧凑版亮主界面的静态预览样式。
       *
       * 为什么这样写：
       * 这页只用来快速确认“亮主界面压缩后是否还能在一屏内读清”，
       * 不需要接真实逻辑，但要尽量贴近当前运行态的结构和节奏。
       *
       * 输入：
       * @param {void} - 纯静态样式，无运行时输入。
       *
       * 输出：
       * @returns {void} 仅定义预览页样式。
       *
       * 注意：
       * - 这里只是 mock 预览，不替代正式页面。
       * - 正式布局继续以 `index2.html` 为准。
       */
      :root {
        --bg-top: #153847;
        --bg-bottom: #09141b;
        --panel-top: rgba(255, 249, 239, 0.98);
        --panel-bottom: rgba(238, 228, 202, 0.95);
        --text: #1f2c34;
        --muted: #637281;
        --gold: #7f5420;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 20% 16%, rgba(225, 185, 111, 0.14), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      .phone {
        width: 390px;
        height: 844px;
        padding: 12px;
        border-radius: 36px;
        background: linear-gradient(180deg, #103240, #0b1f29);
        box-shadow: 0 28px 50px rgba(0, 0, 0, 0.3);
      }

      .screen {
        height: 100%;
        padding: 10px;
        border-radius: 28px;
        overflow: hidden;
        background:
          radial-gradient(circle at 60% 38%, rgba(239, 215, 162, 0.3), transparent 22%),
          linear-gradient(180deg, #173744, #0f2630);
      }

      .table {
        height: 100%;
        display: grid;
        grid-template-rows: 58px 84px 84px 96px 206px 68px;
        gap: 6px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255, 248, 236, 0.96), rgba(235, 223, 196, 0.9));
      }

      .top-pill {
        min-width: 0;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        font-size: 11px;
        font-weight: 800;
      }

      .spots {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        grid-row: span 3;
      }

      .spot {
        padding: 6px 8px;
        border-radius: 12px;
        background: rgba(8, 23, 30, 0.34);
        border: 1px solid rgba(255, 244, 214, 0.12);
      }

      .spot.bottom {
        grid-column: 1 / -1;
      }

      .spot-label {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 3px;
        color: rgba(255, 247, 230, 0.84);
        font-size: 10px;
        font-weight: 700;
      }

      .spot-role {
        display: inline-flex;
        align-items: center;
        padding: 1px 5px;
        border-radius: 999px;
        background: rgba(225, 185, 111, 0.18);
        color: #f1c27b;
        font-size: 8px;
        font-weight: 800;
      }

      .spot-cards {
        display: flex;
        align-items: flex-end;
        min-height: 42px;
      }

      .mini-card {
        width: 32px;
        height: 46px;
        margin-left: -7px;
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff, #e8edf3);
        border: 1px solid rgba(0, 0, 0, 0.12);
      }

      .mini-card:first-child {
        margin-left: 0;
      }

      .hand-panel,
      .center-panel {
        border-radius: 12px;
        background: linear-gradient(180deg, var(--panel-top), var(--panel-bottom));
      }

      .hand-panel {
        padding: 6px 6px 4px;
        overflow: hidden;
      }

      .hand-groups {
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 2px;
      }

      .hand-row {
        display: flex;
        align-items: flex-end;
        gap: 6px;
        min-height: 44px;
      }

      .group-chip {
        min-width: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 6px;
        height: 18px;
        border-radius: 999px;
        background: rgba(127, 84, 32, 0.12);
        color: #8d5c25;
        font-size: 9px;
        font-weight: 800;
      }

      .row-cards {
        display: flex;
        align-items: flex-end;
      }

      .row-cards .mini-card {
        margin-left: -8px;
      }

      .center-panel {
        padding: 6px 6px 8px;
      }

      .setup-options {
        display: flex;
        align-items: center;
        display: flex;
        gap: 6px;
        overflow: hidden;
      }

      .setup-label {
        flex: 0 0 auto;
        align-self: center;
        padding-left: 2px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
      }

      .setup-chip {
        flex: 0 0 auto;
        min-height: 30px;
        padding: 5px 9px;
        border-radius: 999px;
        color: #fff;
        font-size: 11px;
        font-weight: 800;
        white-space: nowrap;
        background: linear-gradient(180deg, #f26d67, #ba3934);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }

      .setup-chip.secondary {
        color: var(--text);
        background: rgba(255, 255, 255, 0.82);
      }

      .setup-mode {
        display: inline-flex;
        align-items: center;
        line-height: 1;
      }

      .setup-card-stack {
        position: relative;
        display: inline-block;
        width: 39px;
        height: 30px;
      }

      .setup-card-stack.three {
        width: 45px;
      }

      .setup-card {
        position: absolute;
        top: 0;
        width: 24px;
        height: 30px;
        border-radius: 6px;
        background: linear-gradient(180deg, #ffffff, #e8edf3);
        border: 1px solid rgba(0, 0, 0, 0.12);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.16);
      }

      .setup-card:nth-child(2) {
        left: 6px;
      }

      .setup-card:nth-child(3) {
        left: 12px;
      }

      .setup-card.red::before,
      .setup-card.black::before,
      .setup-card.joker::before {
        position: absolute;
        left: 4px;
        top: 4px;
        font-size: 9px;
        font-weight: 900;
        line-height: 1;
      }

      .setup-card.red::after,
      .setup-card.black::after,
      .setup-card.joker::after {
        position: absolute;
        left: 4px;
        bottom: 4px;
        font-size: 11px;
        line-height: 1;
      }

      .setup-card.red::before,
      .setup-card.red::after {
        color: #cf453c;
      }

      .setup-card.black::before,
      .setup-card.black::after {
        color: #23323a;
      }

      .setup-card.joker::before,
      .setup-card.joker::after {
        color: #ba3934;
      }

      .setup-card.diamond2::before { content: "2"; }
      .setup-card.diamond2::after { content: "♦"; }
      .setup-card.heart2::before { content: "2"; }
      .setup-card.heart2::after { content: "♥"; }
      .setup-card.spade2::before { content: "2"; }
      .setup-card.spade2::after { content: "♠"; }
      .setup-card.rjoker::before { content: "J"; }
      .setup-card.rjoker::after { content: "🃏"; }
      }

      .setup-mode {
        min-height: 18px;
        padding: 0 6px;
        border-radius: 999px;
        background: rgba(41, 110, 125, 0.14);
        color: #275f6b;
        font-size: 10px;
        font-weight: 900;
      }

      .caption {
        margin-top: 14px;
        color: rgba(248, 244, 236, 0.92);
        font-size: 16px;
        font-weight: 700;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="phone">
        <div class="screen">
          <div class="table">
            <div class="topbar">
              <div class="top-pill">本局 3 / 16</div>
              <div class="top-pill">总分 0</div>
              <div class="top-pill">朋友 A</div>
            </div>

            <div class="spots">
              <section class="spot">
                <div class="spot-label">玩家4 <span class="spot-role">闲</span></div>
                <div class="spot-cards"></div>
              </section>
              <section class="spot">
                <div class="spot-label">玩家3 <span class="spot-role">闲</span></div>
                <div class="spot-cards"></div>
              </section>
              <section class="spot">
                <div class="spot-label">玩家5 <span class="spot-role">闲</span></div>
                <div class="spot-cards"></div>
              </section>
              <section class="spot">
                <div class="spot-label">玩家2 <span class="spot-role">闲</span></div>
                <div class="spot-cards"></div>
              </section>
              <section class="spot bottom">
                <div class="spot-label">玩家1</div>
                <div class="spot-cards"></div>
              </section>
            </div>

            <section class="hand-panel">
              <div class="hand-groups">
                <div class="hand-row">
                  <div class="group-chip">常王4</div>
                  <div class="row-cards">
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                  </div>
                </div>
                <div class="hand-row">
                  <div class="group-chip">梅花6</div>
                  <div class="row-cards">
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                  </div>
                </div>
                <div class="hand-row">
                  <div class="group-chip">方块8</div>
                  <div class="row-cards">
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                  </div>
                </div>
                <div class="hand-row">
                  <div class="group-chip">黑桃5</div>
                  <div class="row-cards">
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                    <div class="mini-card"></div>
                  </div>
                </div>
              </div>
            </section>

            <section class="center-panel">
              <div class="setup-options">
                <div class="setup-label">可亮</div>
                <div class="setup-chip">
                  <span class="setup-card-stack">
                    <span class="setup-card joker rjoker" style="left:0;"></span>
                    <span class="setup-card joker rjoker" style="left:6px;"></span>
                  </span>
                  <span class="setup-mode">无</span>
                </div>
                <div class="setup-chip secondary">
                  <span class="setup-card-stack">
                    <span class="setup-card red diamond2" style="left:0;"></span>
                    <span class="setup-card red diamond2" style="left:6px;"></span>
                  </span>
                </div>
                <div class="setup-chip secondary">
                  <span class="setup-card-stack">
                    <span class="setup-card red heart2" style="left:0;"></span>
                    <span class="setup-card red heart2" style="left:6px;"></span>
                  </span>
                </div>
                <div class="setup-chip secondary">
                  <span class="setup-card-stack three">
                    <span class="setup-card black spade2" style="left:0;"></span>
                    <span class="setup-card black spade2" style="left:6px;"></span>
                    <span class="setup-card black spade2" style="left:12px;"></span>
                  </span>
                </div>
              </div>
            </section>
          </div>
        </div>
      </div>
      <div class="caption">紧凑版手游亮主界面预览</div>
    </div>
  </body>
</html>
