<?xml version="1.0" encoding="UTF-8"?>
<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    作用：
    提供一张适合在对话窗口中完整查看的 PC 小尺寸 mockup。
    
    为什么这样写：
    原始宽屏设计稿在当前预览器里会被裁切；
    单独输出缩小版静态稿，能更稳定地展示完整构图关系。
    
    输入：
    @param {void} xxx - 静态设计稿，无运行时输入。
    
    输出：
    @returns {SVGDocument} 一张 960x540 的完整 PC 布局 mockup。
    
    注意：
    - 这张图用于沟通布局，不代表最终视觉定稿。
    - 仅覆盖 PC 方案，不涉及 mobile 与 AI 逻辑。
  -->
  <defs>
    <linearGradient id="bg" x1="480" y1="0" x2="480" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173E4B"/>
      <stop offset="1" stop-color="#0D2833"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5EFE3"/>
      <stop offset="1" stop-color="#E6D6B4"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3EFE7"/>
      <stop offset="1" stop-color="#E3DBCB"/>
    </linearGradient>
    <style>
      .t1 { font: 700 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1C262C; }
      .t2 { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26343C; }
      .t3 { font: 600 10px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5E6E76; }
      .t4 { font: 700 10px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8F2E7; }
      .t5 { font: 700 9px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #846331; }
      .dashed { fill: rgba(255,255,255,.02); stroke: rgba(243,233,211,.28); stroke-width: 1.5; stroke-dasharray: 6 4; }
    </style>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="8" y="8" width="944" height="524" rx="16" stroke="rgba(255,255,255,.08)"/>

  <!-- 顶部 -->
  <rect x="12" y="14" width="150" height="108" rx="14" fill="url(#warm)"/>
  <rect x="160" y="14" width="404" height="108" rx="14" fill="url(#warm)"/>
  <rect x="566" y="14" width="382" height="162" rx="14" fill="url(#soft)"/>

  <text x="24" y="40" class="t2">朋友牌</text>
  <text x="24" y="58" class="t3">第一张梅花 A 已出现</text>
  <rect x="22" y="70" width="38" height="54" rx="4" fill="#FFFDF7" stroke="#D6A663"/>
  <text x="31" y="103" style="font:700 26px serif; fill:#1E1E1E;">♣</text>
  <text x="70" y="88" class="t2">第一张梅花 A</text>
  <text x="70" y="106" class="t3">朋友已揭晓：玩家5</text>

  <text x="176" y="42" class="t1">五人找朋友升级</text>
  <rect x="176" y="58" width="118" height="56" rx="10" fill="rgba(255,255,255,.66)"/>
  <rect x="304" y="58" width="118" height="56" rx="10" fill="rgba(255,255,255,.66)"/>
  <rect x="432" y="58" width="118" height="56" rx="10" fill="rgba(255,255,255,.66)"/>
