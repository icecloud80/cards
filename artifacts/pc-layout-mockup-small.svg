    <rect x="924" y="92" width="20" height="22" rx="7" fill="#FFFDF8"/><text x="928" y="107" class="t5">新</text>
  </g>
  <rect x="578" y="124" width="94" height="26" rx="8" fill="#FFFDF8"/>
