  <text x="444" y="78" class="t3">轮次</text>
  <text x="444" y="96" class="t2">第 14 轮</text>

  <text x="580" y="40" style="font:800 28px 'PingFang SC', sans-serif; fill:#C9524B;">7</text>
  <text x="604" y="40" class="t3" style="fill:#C9524B;">秒</text>
  <text x="884" y="36" class="t2" style="font-size:11px;">非打家总分</text>
