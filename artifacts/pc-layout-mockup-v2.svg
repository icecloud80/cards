<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    作用：
    输出一张适合在当前对话窗口完整预览的 PC mockup v2。
    
    为什么这样写：
    预览器会把宽屏图压成方形缩略图，因此这里直接使用方画布，
    在方画布中放入完整的 16:9 桌面界面，避免再次出现只看见半张图的问题。
    
    输入：
    @param {void} xxx - 纯静态设计稿，不依赖运行时数据。
    
    输出：
    @returns {SVGDocument} 一张 1200 x 1200 的 PC 界面 mockup 设计图。
    
    注意：
    - 这是设计稿，不是实现代码截图。
    - 仅服务于 PC 布局讨论，不涉及 mobile 和 AI 逻辑。
  -->
  <defs>
    <linearGradient id="pageBg" x1="600" y1="40" x2="600" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F3541"/>
      <stop offset="1" stop-color="#081E26"/>
    </linearGradient>
    <linearGradient id="tableBg" x1="600" y1="184" x2="600" y2="816" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C4B59"/>
      <stop offset="1" stop-color="#123845"/>
    </linearGradient>
    <linearGradient id="creamPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7F1E6"/>
      <stop offset="1" stop-color="#E8D9B8"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5F3EE"/>
      <stop offset="1" stop-color="#E4DDD0"/>
    </linearGradient>
    <linearGradient id="friendPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF4EF"/>
      <stop offset="1" stop-color="#D3E4D6"/>
    </linearGradient>
    <linearGradient id="defenderPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3EEEC"/>
      <stop offset="1" stop-color="#DDD6D1"/>
    </linearGradient>
    <linearGradient id="bankerPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8F0E0"/>
      <stop offset="1" stop-color="#EAD7A5"/>
    </linearGradient>
    <filter id="shadowLg" x="0" y="0" width="1200" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#041217" flood-opacity="0.36"/>
    </filter>
    <filter id="shadowMd" x="-20" y="-20" width="1400" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#07161B" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 28px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1B242A; }
      .headline { font: 700 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1B262C; }
      .label { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6B6256; letter-spacing: .2px; }
      .copy { font: 600 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #516067; }
      .small { font: 600 11px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A8A90; }
      .score { font: 800 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #9A6127; }
      .tag { font: 700 11px "PingFang SC", "Microsoft YaHei", sans-serif; }
      .fieldTitle { font: 700 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8F3E9; }
      .fieldCopy { font: 600 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #C8D4D8; }
      .buttonText { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #25323A; }
      .buttonTextLight { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFF9F4; }
    </style>
  </defs>

  <rect width="1200" height="1200" fill="url(#pageBg)"/>
  <circle cx="986" cy="166" r="136" fill="#113846" fill-opacity=".24"/>
  <circle cx="158" cy="1028" r="184" fill="#153C49" fill-opacity=".22"/>
  <circle cx="314" cy="124" r="108" fill="#E2B462" fill-opacity=".05"/>

  <!-- 中央桌面画布 -->
