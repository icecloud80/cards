<?xml version="1.0" encoding="UTF-8"?>
<svg width="1560" height="878" viewBox="0 0 1560 878" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    作用：
    输出一版新的 PC 界面原型图，重点展示“轻顶部信息 + 规整出牌区 + 简化玩家面板”的桌面端方向。
    
    为什么这样写：
    本轮需求先看原型，不直接改正式实现；
    SVG 适合在仓库里做版本化迭代，也方便后续继续拿这份设计稿对实现做切图和拆区。
    
    输入：
    @param {void} xxx - 静态设计稿，无运行时输入。
    
    输出：
    @returns {SVGDocument} 一张 1560x878 的 PC v2 原型图。
    
    注意：
    - 这是设计稿，不代表运行态页面已经同步。
    - 本稿重点验证信息层级和区域编排，不做像素级 UI 定稿。
  -->
  <defs>
    <linearGradient id="bg" x1="780" y1="0" x2="780" y2="878" gradientUnits="userSpaceOnUse">
      <stop stop-color="#163845"/>
      <stop offset="1" stop-color="#08141B"/>
    </linearGradient>
    <linearGradient id="surface" x1="780" y1="18" x2="780" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1F4D5C"/>
      <stop offset="1" stop-color="#143542"/>
    </linearGradient>
    <linearGradient id="panelLight" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8F2E6"/>
      <stop offset="1" stop-color="#E6D7B7"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FBF7F1"/>
      <stop offset="1" stop-color="#E8DFC8"/>
    </linearGradient>
    <linearGradient id="panelDark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="rgba(12, 26, 34, 0.84)"/>
      <stop offset="1" stop-color="rgba(10, 22, 29, 0.92)"/>
    </linearGradient>
    <linearGradient id="slotStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="rgba(244, 225, 174, 0.48)"/>
      <stop offset="1" stop-color="rgba(223, 187, 95, 0.22)"/>
    </linearGradient>
    <radialGradient id="battleGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(780 406) rotate(90) scale(288 490)">
      <stop stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadowLg" x="-48" y="-48" width="1656" height="974" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#06131A" flood-opacity="0.34"/>
    </filter>
    <filter id="shadowMd" x="-20" y="-20" width="520" height="280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#08161C" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 700 25px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #162127; }
      .heading { font: 700 18px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1E2B31; }
      .label { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7A6B53; letter-spacing: .24px; }
      .copy { font: 600 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #53626A; }
      .small { font: 600 11px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #809098; }
      .battleLabel { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: rgba(244, 237, 223, .92); letter-spacing: .16px; }
      .battleCopy { font: 600 11px "PingFang SC", "Microsoft YaHei", sans-serif; fill: rgba(223, 233, 236, .74); }
      .chipText { font: 700 11px "PingFang SC", "Microsoft YaHei", sans-serif; }
      .score { font: 800 34px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #96591F; }
      .timer { font: 800 42px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #C6544D; }
      .menuText { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #243038; }
      .menuSub { font: 600 11px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #75838A; }
    </style>
  </defs>

  <rect width="1560" height="878" fill="url(#bg)"/>
  <rect x="12" y="18" width="1536" height="842" rx="26" fill="url(#surface)" filter="url(#shadowLg)"/>
  <rect x="22" y="28" width="1516" height="822" rx="22" fill="none" stroke="rgba(255,255,255,.08)"/>
  <rect x="36" y="42" width="1488" height="794" rx="18" fill="none" stroke="rgba(255,255,255,.05)" stroke-dasharray="8 8"/>

  <!-- 顶部轻信息带 -->
  <g filter="url(#shadowMd)">
    <rect x="32" y="30" width="1496" height="126" rx="22" fill="url(#panelLight)"/>
  </g>

  <text x="58" y="68" class="title">五人找朋友升级</text>
  <rect x="232" y="44" width="62" height="28" rx="14" fill="#DED1B8"/>
  <text x="248" y="63" class="chipText" fill="#675B45">出牌中</text>
  <rect x="304" y="44" width="82" height="28" rx="14" fill="#EFE7D7"/>
  <text x="320" y="63" class="chipText" fill="#7B6F5B">玩家1回合</text>

  <!-- 朋友牌压缩到顶部左侧 -->
  <rect x="56" y="84" width="54" height="74" rx="6" fill="#FFFDF7" stroke="#D6A665" stroke-width="2"/>
  <text x="66" y="106" class="small" fill="#202328">A</text>
  <text x="68" y="146" style="font:700 40px serif; fill:#1C1C1C;">♣</text>
  <text x="124" y="108" class="label">朋友牌</text>
  <text x="124" y="130" class="heading" style="font-size:16px;">第一张梅花 A</text>
  <text x="124" y="149" class="copy">已揭晓 · 玩家5</text>

  <!-- 顶部关键状态三联卡 -->
  <rect x="388" y="52" width="184" height="82" rx="16" fill="rgba(255,255,255,.66)"/>
  <rect x="584" y="52" width="184" height="82" rx="16" fill="rgba(255,255,255,.66)"/>
  <rect x="780" y="52" width="184" height="82" rx="16" fill="rgba(255,255,255,.66)"/>
  <text x="406" y="78" class="label">主牌 / 级牌</text>
  <text x="406" y="105" class="heading" style="font-size:17px;">无主 · 2 级</text>
  <text x="406" y="123" class="copy">由翻底定主</text>
  <text x="602" y="78" class="label">打家 / 轮次</text>
  <text x="602" y="105" class="heading" style="font-size:17px;">玩家2 · 第14轮</text>
  <text x="602" y="123" class="copy">当前最大：玩家4</text>
  <text x="798" y="78" class="label">局面提示</text>
  <text x="798" y="105" class="heading" style="font-size:17px;">优先看桌面，不靠长文案</text>
  <text x="798" y="123" class="copy">关键状态进出牌卡，次要功能进菜单</text>

  <!-- 右上计分与按钮 -->
  <rect x="994" y="44" width="92" height="46" rx="16" fill="rgba(255,255,255,.64)"/>
  <text x="1016" y="77" class="timer">7</text>
  <text x="1050" y="76" class="label" fill="#C6544D">秒</text>

  <text x="1108" y="63" class="label">非打家总分</text>
  <text x="1164" y="100" class="score">60</text>
  <text x="1108" y="122" class="copy">玩家1准备出牌</text>

  <rect x="1264" y="48" width="72" height="32" rx="12" fill="#FFFDF8"/>
  <rect x="1346" y="48" width="72" height="32" rx="12" fill="#FFFDF8"/>
  <rect x="1428" y="48" width="72" height="32" rx="12" fill="#F1F6FF" stroke="#356CC8" stroke-width="2"/>
  <text x="1286" y="69" class="menuText">托管</text>
  <text x="1368" y="69" class="menuText">新局</text>
  <text x="1450" y="69" class="menuText">更多</text>

  <!-- 顶部右侧更多菜单，表示次要功能收纳 -->
  <g filter="url(#shadowMd)">
    <rect x="1306" y="88" width="194" height="164" rx="18" fill="url(#panelSoft)"/>
  </g>
  <text x="1328" y="116" class="heading" style="font-size:15px;">更多功能</text>
  <rect x="1324" y="130" width="158" height="28" rx="10" fill="rgba(255,255,255,.7)"/>
