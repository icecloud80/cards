    <rect x="974" y="214" width="308" height="156" rx="22" fill="url(#panelDark)" stroke="url(#slotStroke)" stroke-width="2"/>
    <rect x="152" y="410" width="308" height="156" rx="22" fill="url(#panelDark)" stroke="url(#slotStroke)" stroke-width="2"/>
    <rect x="1100" y="410" width="308" height="156" rx="22" fill="url(#panelDark)" stroke="url(#slotStroke)" stroke-width="2"/>
    <rect x="626" y="514" width="308" height="156" rx="22" fill="url(#panelDark)" stroke="#E7BD6D" stroke-width="2.4"/>
  </g>

