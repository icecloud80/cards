<?xml version="1.0" encoding="UTF-8"?>
<svg width="1560" height="878" viewBox="0 0 1560 878" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    作用：
    生成 PC 界面重排方案的静态 mockup，用于确认视觉分区、层级与信息密度。
    
    为什么这样写：
    当前用户希望先看设计稿、不直接改实现；SVG 方便在仓库内直接预览、迭代和版本管理。
    
    输入：
    @param {void} xxx - 该文件为静态设计稿，无运行时输入。
    
    输出：
    @returns {SVGDocument} 一张 1560x878 的 PC 布局 mockup 图。
    
    注意：
    - 这是设计稿，不代表当前实现已经同步。
    - 重点是版式、层级和视觉节奏，不是最终像素级 UI 定稿。
  -->
  <defs>
    <linearGradient id="bg" x1="780" y1="18" x2="780" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173E4B"/>
      <stop offset="1" stop-color="#0C2833"/>
    </linearGradient>
    <linearGradient id="panelWarm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F5EFE3"/>
      <stop offset="1" stop-color="#E7D8B7"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3F0EA"/>
      <stop offset="1" stop-color="#E8DFC8"/>
    </linearGradient>
    <linearGradient id="panelCool" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F0EFE9"/>
      <stop offset="1" stop-color="#D7DCD7"/>
    </linearGradient>
    <linearGradient id="panelDefender" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2ECEB"/>
      <stop offset="1" stop-color="#DDD7D2"/>
    </linearGradient>
    <linearGradient id="panelFriend" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF2ED"/>
      <stop offset="1" stop-color="#D4E2D6"/>
    </linearGradient>
    <linearGradient id="panelBanker" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7F0DE"/>
      <stop offset="1" stop-color="#EAD7A2"/>
    </linearGradient>
    <filter id="shadowLg" x="-40" y="-40" width="1640" height="958" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#07161B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowMd" x="-20" y="-20" width="320" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0A1B20" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 700 24px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #152127; }
      .headline { font: 700 16px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1D2A31; }
      .label { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #6B6255; letter-spacing: .2px; }
      .copy { font: 600 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4A5961; }
      .small { font: 600 11px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #75838A; }
      .score { font: 700 20px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #935B1F; }
      .hero { font: 700 48px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #9B6027; }
      .timer { font: 800 42px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #C9574F; }
      .tag { font: 700 11px "PingFang SC", "Microsoft YaHei", sans-serif; }
      .mutedStroke { stroke: rgba(255,255,255,.16); }
      .dashBox { fill: rgba(255,255,255,.02); stroke: rgba(245,235,212,.26); stroke-width: 2; stroke-dasharray: 7 5; }
      .btnText { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #26323A; }
      .btnTextPrimary { font: 700 12px "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFF9F4; }
    </style>
  </defs>

