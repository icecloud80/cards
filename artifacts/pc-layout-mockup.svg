  <text x="523" y="244" class="chipText" fill="#F4EAD3">分0</text>
  <text x="563" y="244" class="chipText" fill="#182229">大</text>
  <rect x="294" y="274" width="64" height="92" rx="6" fill="#FFFDF8"/>
  <rect x="344" y="286" width="64" height="92" rx="6" fill="#FFFDF8"/>
  <text x="304" y="298" class="small" fill="#101317">A</text>
  <text x="352" y="310" class="small" fill="#101317">10</text>
  <text x="312" y="349" style="font:700 44px serif; fill:#1A1A1A;">♠</text>
  <text x="362" y="361" style="font:700 44px serif; fill:#D23A35;">♦</text>
  <text x="442" y="322" class="battleCopy">出牌头部直接带身份、等级和本轮状态</text>

  <!-- 玩家3 -->
  <circle cx="1010" cy="246" r="18" fill="#D9E6EE"/>
  <text x="1001" y="253" style="font:700 18px sans-serif; fill:#617584;">狼</text>
  <text x="1038" y="240" class="battleLabel">玩家3</text>
