<?xml version="1.0" encoding="UTF-8"?>
<!--
作用：
- 提供 App 原生壳主战场界面的中保真设计稿。

为什么这样写：
- App 端需要强调安全区、固定手牌区和底部拇指操作条；
- 单独的设计稿能更直观看到它和 H5 的差异。

注意：
- 该稿聚焦原生壳中的牌桌主界面。
- 重点是结构、层次和触控感，不是最终像素稿。
-->
<svg width="430" height="932" viewBox="0 0 430 932" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="appBg" x1="36" y1="22" x2="392" y2="906" gradientUnits="userSpaceOnUse">
      <stop stop-color="#183843"/>
      <stop offset="1" stop-color="#08161B"/>
    </linearGradient>
    <linearGradient id="appBoard" x1="50" y1="90" x2="380" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#25505B"/>
      <stop offset="1" stop-color="#173A45"/>
    </linearGradient>
    <style>
      .title { font: 700 20px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .copy { font: 500 12px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #D6E2E0; }
      .label { font: 700 11px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .panel-title { font: 700 13px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #18333A; }
      .panel-copy { font: 500 11px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #4C656B; }
      .seat-title { font: 700 12px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F9FBFA; }
      .seat-copy { font: 500 10px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #C8D8D5; }
    </style>
  </defs>

  <rect width="430" height="932" fill="url(#appBg)"/>
  <circle cx="350" cy="134" r="96" fill="#D2B06A" fill-opacity="0.12"/>
  <circle cx="78" cy="808" r="126" fill="#6BB8B0" fill-opacity="0.10"/>

  <text x="34" y="42" class="title">找朋友升级 · App 界面图</text>
  <text x="34" y="62" class="copy">原生壳强调 Safe Area、稳态手牌托盘和固定拇指操作条</text>

  <rect x="24" y="82" width="382" height="814" rx="34" fill="url(#appBoard)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <rect x="36" y="98" width="358" height="68" rx="22" fill="#102830" fill-opacity="0.86" stroke="rgba(255,255,255,0.10)"/>
  <text x="52" y="120" class="copy">Safe Area 顶栏</text>

  <rect x="48" y="122" width="44" height="30" rx="15" fill="#F2F6F4"/>
  <text x="61" y="141" class="panel-title">18s</text>
  <rect x="98" y="122" width="52" height="30" rx="15" fill="#F2F6F4"/>
  <text x="112" y="141" class="panel-title">125</text>
  <rect x="156" y="122" width="40" height="30" rx="15" fill="#F2F6F4"/>
  <text x="169" y="141" class="panel-title">高</text>
  <rect x="208" y="122" width="54" height="30" rx="15" fill="rgba(244,248,247,0.14)" stroke="rgba(255,255,255,0.16)"/>
  <text x="222" y="141" class="label">主 ♠2</text>
  <rect x="268" y="122" width="62" height="30" rx="15" fill="rgba(244,248,247,0.14)" stroke="rgba(255,255,255,0.16)"/>
  <text x="282" y="141" class="label">朋 ♦A</text>
  <rect x="342" y="122" width="18" height="30" rx="9" fill="#244B56"/>
  <rect x="366" y="122" width="18" height="30" rx="9" fill="#D66556"/>

  <text x="54" y="194" class="label">中部自适应主战场</text>
  <text x="54" y="212" class="copy">自己出牌区贴近拇指区，关键阶段统一改成步骤浮层</text>

  <g transform="translate(130 226)">
    <rect width="170" height="74" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="20" y="30" class="seat-title">玩家3 出牌位</text>
    <text x="20" y="51" class="seat-copy">顶端仅保留必要信息</text>
  </g>
  <g transform="translate(44 334)">
    <rect width="126" height="84" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="18" y="31" class="seat-title">玩家5</text>
    <text x="18" y="52" class="seat-copy">左侧席位</text>
  </g>
  <g transform="translate(260 334)">
    <rect width="126" height="84" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="18" y="31" class="seat-title">玩家4</text>
    <text x="18" y="52" class="seat-copy">右侧席位</text>
  </g>
  <g transform="translate(120 446)">
    <rect width="190" height="78" rx="24" fill="#ECF1EE"/>
    <text x="18" y="31" class="panel-title">步骤浮层</text>
    <text x="18" y="53" class="panel-copy">亮主 / 反主 / 叫朋友 / 扣底 全部从这里读</text>
  </g>
  <g transform="translate(104 548)">
    <rect width="222" height="90" rx="28" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="34" class="seat-title">玩家1 自己出牌位</text>
    <text x="24" y="58" class="seat-copy">视觉上更靠近手牌托盘和底部主按钮</text>
    <rect x="24" y="68" width="110" height="10" rx="5" fill="#88D1CE"/>
  </g>

  <rect x="36" y="670" width="358" height="144" rx="26" fill="#0E232A" fill-opacity="0.84" stroke="rgba(255,255,255,0.08)"/>
  <text x="54" y="698" class="label">固定手牌托盘</text>
  <text x="54" y="716" class="copy">两行压叠，选中态更强，长按可预览，减少误触</text>
  <g transform="translate(54 734)">
    <rect width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="22" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="44" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="66" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="88" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="110" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="132" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="154" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="176" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="198" width="30" height="44" rx="10" fill="#D85C4A"/>
  </g>
  <g transform="translate(54 786)">
    <rect width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="22" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="44" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="66" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="88" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="110" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="132" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="154" width="30" height="44" rx="10" fill="#D85C4A"/>
  </g>

  <rect x="48" y="826" width="334" height="50" rx="25" fill="#102830" fill-opacity="0.92" stroke="rgba(255,255,255,0.08)"/>
  <rect x="58" y="836" width="66" height="30" rx="15" fill="#244B56"/>
  <text x="80" y="855" class="label">清空</text>
  <rect x="132" y="834" width="92" height="34" rx="17" fill="#1F6DFF"/>
  <text x="164" y="855" class="label">出牌</text>
  <rect x="232" y="836" width="66" height="30" rx="15" fill="#244B56"/>
  <text x="254" y="855" class="label">托管</text>
  <rect x="306" y="836" width="66" height="30" rx="15" fill="#244B56"/>
  <text x="328" y="855" class="label">更多</text>
</svg>
