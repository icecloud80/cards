<?xml version="1.0" encoding="UTF-8"?>
<!--
作用：
- 提供 H5 手机浏览器主战场界面的中保真设计稿。

为什么这样写：
- H5 端和 App 端虽然都属于移动端，但浏览器安全区、菜单密度和底栏留白不同；
- 单独出一张图更容易评审“手机浏览器版”的布局决策。

注意：
- 只表达 UI 结构和视觉方向，不接真实数据。
- 重点关注顶部压缩、拇指可达区和底部固定操作条。
-->
<svg width="430" height="932" viewBox="0 0 430 932" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="h5Bg" x1="40" y1="20" x2="390" y2="912" gradientUnits="userSpaceOnUse">
      <stop stop-color="#183A44"/>
      <stop offset="1" stop-color="#09171C"/>
    </linearGradient>
    <linearGradient id="h5Board" x1="54" y1="72" x2="376" y2="852" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24535E"/>
      <stop offset="1" stop-color="#163944"/>
    </linearGradient>
    <style>
      .title { font: 700 20px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .copy { font: 500 12px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #D6E2E0; }
      .label { font: 700 11px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .panel-title { font: 700 13px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #18333A; }
      .panel-copy { font: 500 11px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #4C656B; }
      .seat-title { font: 700 12px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F9FBFA; }
      .seat-copy { font: 500 10px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #C8D8D5; }
    </style>
  </defs>

  <rect width="430" height="932" fill="url(#h5Bg)"/>
  <circle cx="82" cy="92" r="96" fill="#D2B06A" fill-opacity="0.12"/>
  <circle cx="360" cy="810" r="120" fill="#6BB8B0" fill-opacity="0.10"/>

  <text x="34" y="42" class="title">找朋友升级 · H5 界面图</text>
  <text x="34" y="62" class="copy">浏览器版更强调压缩顶栏、减少噪音和底部稳态操作</text>

  <rect x="24" y="78" width="382" height="818" rx="30" fill="url(#h5Board)" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <rect x="36" y="94" width="358" height="60" rx="22" fill="#102830" fill-opacity="0.86" stroke="rgba(255,255,255,0.10)"/>

  <rect x="48" y="106" width="44" height="34" rx="17" fill="#F2F6F4"/>
  <text x="61" y="127" class="panel-title">18s</text>
  <rect x="98" y="106" width="52" height="34" rx="17" fill="#F2F6F4"/>
  <text x="112" y="127" class="panel-title">125</text>
  <rect x="156" y="106" width="40" height="34" rx="17" fill="#F2F6F4"/>
  <text x="169" y="127" class="panel-title">高</text>
  <rect x="206" y="106" width="54" height="34" rx="17" fill="rgba(244,248,247,0.14)" stroke="rgba(255,255,255,0.16)"/>
  <text x="220" y="127" class="label">主 ♠2</text>
  <rect x="266" y="106" width="62" height="34" rx="17" fill="rgba(244,248,247,0.14)" stroke="rgba(255,255,255,0.16)"/>
  <text x="280" y="127" class="label">朋 ♦A</text>
  <rect x="336" y="106" width="20" height="34" rx="10" fill="#244B56"/>
  <rect x="362" y="106" width="20" height="34" rx="10" fill="#D66556"/>

  <text x="54" y="182" class="label">中央主战场</text>
  <text x="54" y="198" class="copy">顶部信息极简，关键动作和手牌尽量靠近拇指热区</text>

  <g transform="translate(122 216)">
    <rect width="186" height="84" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="18" y="30" class="seat-title">玩家3 出牌位</text>
    <text x="18" y="52" class="seat-copy">待出 / 身份签 / 当前分数</text>
    <rect x="18" y="60" width="82" height="10" rx="5" fill="#E0B96D"/>
  </g>

  <g transform="translate(44 338)">
    <rect width="132" height="86" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="18" y="30" class="seat-title">玩家5 出牌位</text>
    <text x="18" y="52" class="seat-copy">手牌/得分摘要</text>
  </g>
  <g transform="translate(254 338)">
    <rect width="132" height="86" rx="24" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="18" y="30" class="seat-title">玩家4 出牌位</text>
    <text x="18" y="52" class="seat-copy">手牌/得分摘要</text>
  </g>

  <g transform="translate(52 452)">
    <rect width="326" height="74" rx="22" fill="#ECF1EE"/>
    <text x="18" y="30" class="panel-title">焦点步骤卡</text>
    <text x="18" y="52" class="panel-copy">请选择同型跟牌，可点清空，错误提示统一在这里读</text>
  </g>

  <g transform="translate(108 548)">
    <rect width="214" height="90" rx="26" fill="#10303A" stroke="rgba(255,255,255,0.08)"/>
    <text x="24" y="34" class="seat-title">玩家1 出牌位</text>
    <text x="24" y="58" class="seat-copy">自己 / 已选 2 张 / 出牌按钮固定在底部</text>
    <rect x="24" y="68" width="96" height="10" rx="5" fill="#85CFCC"/>
  </g>

  <rect x="36" y="664" width="358" height="156" rx="26" fill="#0E232A" fill-opacity="0.82" stroke="rgba(255,255,255,0.08)"/>
  <text x="54" y="694" class="label">固定手牌托盘</text>
  <text x="54" y="712" class="copy">保留分组，但去掉多余说明，只强化牌面与选中态</text>

  <g transform="translate(54 728)">
    <text x="0" y="12" class="copy">主牌组</text>
    <rect x="56" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="78" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="100" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="122" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="144" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
  </g>
  <g transform="translate(54 780)">
    <text x="0" y="12" class="copy">方块组</text>
    <rect x="56" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="78" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="100" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
    <rect x="122" y="0" width="30" height="44" rx="10" fill="#D85C4A"/>
  </g>

  <rect x="36" y="834" width="358" height="44" rx="22" fill="#102830" fill-opacity="0.90" stroke="rgba(255,255,255,0.08)"/>
  <rect x="48" y="842" width="66" height="28" rx="14" fill="#244B56"/>
  <text x="70" y="860" class="label">清空</text>
  <rect x="122" y="842" width="86" height="28" rx="14" fill="#1F6DFF"/>
  <text x="152" y="860" class="label">出牌</text>
  <rect x="216" y="842" width="66" height="28" rx="14" fill="#244B56"/>
  <text x="238" y="860" class="label">托管</text>
  <rect x="290" y="842" width="84" height="28" rx="14" fill="#244B56"/>
  <text x="320" y="860" class="label">更多</text>
</svg>
