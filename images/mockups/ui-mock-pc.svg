<?xml version="1.0" encoding="UTF-8"?>
<!--
作用：
- 提供 PC 主战场界面的中保真设计稿。

为什么这样写：
- 用户需要直接可看的三端界面图；
- SVG 方便仓库内预览、评审和后续继续细化，不依赖额外截图工具。

注意：
- 这是视觉设计稿，不接入真实玩法逻辑。
- 重点表达布局、视觉层级和操作热区，不作为像素级最终实现稿。
-->
<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pcBg" x1="160" y1="32" x2="1440" y2="868" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173640"/>
      <stop offset="1" stop-color="#0B1A21"/>
    </linearGradient>
    <linearGradient id="pcBoard" x1="250" y1="80" x2="1350" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24505B"/>
      <stop offset="1" stop-color="#163944"/>
    </linearGradient>
    <filter id="pcShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font: 700 28px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .copy { font: 500 14px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #D7E3E0; }
      .label { font: 700 13px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F0F5F4; letter-spacing: 0.6px; }
      .panel-title { font: 700 16px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #18333A; }
      .panel-copy { font: 500 13px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #4C656B; }
      .seat-title { font: 700 15px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F9FBFA; }
      .seat-copy { font: 500 12px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #C6D8D4; }
      .button-text { font: 700 15px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #F7FBFA; }
      .metric { font: 700 13px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #264851; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#pcBg)"/>
  <circle cx="134" cy="114" r="200" fill="#D2B06A" fill-opacity="0.10"/>
  <circle cx="1410" cy="780" r="240" fill="#68A9A5" fill-opacity="0.08"/>

  <text x="110" y="72" class="title">找朋友升级 · PC 主战场界面图</text>
  <text x="110" y="102" class="copy">方向：现代清爽桌游感 / 目标：高信息效率、快反馈、低视觉噪音</text>

