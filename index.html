<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>页面跳转中</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #163847;
        --bg-bottom: #09141b;
        --panel: rgba(10, 22, 29, 0.84);
        --border: rgba(225, 185, 111, 0.2);
        --text: rgba(248, 244, 236, 0.94);
        --muted: rgba(248, 244, 236, 0.72);
        --accent: #d8ad63;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "SF Pro Display", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(225, 185, 111, 0.12), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      }

      .panel {
        width: min(520px, 100%);
        padding: 24px 22px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 24px 56px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(24px, 4vw, 32px);
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      a {
        color: #11171c;
        text-decoration: none;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>正在进入合适的页面</h1>
      <p id="status">系统会根据当前屏幕方向和尺寸，自动跳转到横屏桌面版或手机竖屏版。</p>
      <div class="links">
        <a href="./index1-pc.html">打开横屏版</a>
        <a href="./index2.html">打开手机版</a>
      </div>
    </main>
    <script>
      (function () {
        var width = window.innerWidth || document.documentElement.clientWidth || screen.width || 0;
        var height = window.innerHeight || document.documentElement.clientHeight || screen.height || 0;
        var shortSide = Math.min(width, height);
        var isPortrait = height >= width;
        var isPhonePortrait = isPortrait && shortSide <= 820;
        var target = isPhonePortrait ? "./index2.html" : "./index1-pc.html";
        var status = document.getElementById("status");

        if (status) {
          status.textContent =
            "检测到当前为" +
            (isPhonePortrait ? "手机竖屏" : "横屏或大屏") +
            "，即将跳转到" +
            (isPhonePortrait ? " index2.html" : " index1-pc.html") +
            "。";
        }

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
